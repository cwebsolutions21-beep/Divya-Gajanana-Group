<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Product Catalog | Sree Gajanana Enterprises</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .category-section {
            margin-bottom: 5rem;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 2.5rem;
            padding: 1.5rem 2rem;
            background: rgba(142, 185, 93, 0.05);
            border-radius: 20px;
            border-left: 5px solid var(--primary);
        }

        .category-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: #fff;
            border-radius: 50%;
            padding: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .category-info h2 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 900;
            color: #1a1c1a;
            text-transform: capitalize;
        }

        .category-info p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 240px);
            gap: 2rem;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .product-item-card {
            width: 240px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 1.2rem;
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid rgba(142, 185, 93, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            transition: 0.3s;
            height: 100%;
        }

        .product-item-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 15px 40px rgba(142, 185, 93, 0.08);
        }

        .item-icon-wrapper {
            width: 50px;
            height: 50px;
            background: rgba(142, 185, 93, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .item-icon-wrapper i { font-size: 1.5rem; color: var(--primary); }
        .item-icon-wrapper img { max-width: 60%; object-fit: contain; }

        .product-item-card h4 {
            font-size: 1.15rem;
            font-weight: 800;
            color: #1a1c1a;
            margin-bottom: 0.2rem;
        }

        .product-item-card p {
            font-size: 0.8rem;
            color: #555e55;
            line-height: 1.4;
            margin-bottom: 0.8rem;
            min-height: 1.2rem;
        }

        .product-divider {
            width: 100%;
            height: 1px;
            background: rgba(0,0,0,0.05);
            margin-bottom: 0.8rem;
        }

        .product-footer {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stepper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f0f4ef;
            padding: 5px 12px;
            border-radius: 10px;
            border: 1px solid var(--primary);
        }

        .step-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
        }

        .qty-val {
            font-weight: 800;
            color: #1a1c1a;
            font-size: 0.9rem;
            min-width: 18px;
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: 0 4px 12px var(--primary-glow);
            transition: 0.3s;
        }

        .add-btn:hover { transform: scale(1.1); }

        .product-price {
            background: rgba(142, 185, 93, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 0;
            display: inline-block;
            border: 1px solid rgba(142, 185, 93, 0.2);
            box-shadow: 0 4px 10px rgba(142, 185, 93, 0.05);
        }

        .product-qty {
            font-size: 0.75rem;
            color: #3b82f6;
            font-weight: 700;
            background: rgba(59, 130, 246, 0.05);
            padding: 5px 12px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .order-bar {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 3rem);
            max-width: 600px;
            background: #1a1c1a;
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            box-shadow: 0 15px 45px rgba(0,0,0,0.3);
            border: 1px solid rgba(142, 185, 93, 0.3);
            backdrop-filter: blur(10px);
        }

        .order-bar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .order-info {
            display: flex;
            flex-direction: column;
        }

        .order-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .order-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        header { padding: 1.2rem 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        main { padding-top: 140px; padding-bottom: 150px; }

        @media (max-width: 768px) {
            .category-header { flex-direction: column; text-align: center; padding: 1.5rem; }
            .category-logo { margin: 0 auto; }
        }
    </style>
</head>

<body>
    <canvas id="blocks-canvas" style="position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.3;"></canvas>
    <div class="watermark"></div>

    <header>
        <div class="container">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; align-items:center; gap:15px;">
                    <a href="index.html" style="color:var(--text); text-decoration:none;"><i class="fas fa-arrow-left"></i></a>
                    <h1 style="font-size:1.6rem; margin:0; font-weight:900;">Product Catalog</h1>
                </div>
                <div style="display:flex; align-items:center; gap:20px;">
                    <button onclick="window.location.href='index.html'" class="view-btn" style="padding:0.4rem 1.2rem; font-size:0.75rem;">Home</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container" id="catalogContent">
        <!-- Categories and Products injected here -->
    </main>

    <!-- Floating Order Bar -->
    <div id="orderBar" class="order-bar">
        <div class="order-bar-content">
            <div class="order-info">
                <span id="itemCount" style="font-weight:900; font-size:1.1rem;">0 Items</span>
                <div id="totalPriceDisplay" style="font-size:0.85rem; opacity:0.8;">Total: ₹0</div>
            </div>
            <button class="order-btn" onclick="sendOrder()">
                WhatsApp Order <i class="fab fa-whatsapp"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase Configuration (REPLACE THIS WITH YOUR KEYS)
        const firebaseConfig = {
            apiKey: "AIzaSyC-QqISU9tK-glLSK3qnCWcK2cHXwaZMOY",
            authDomain: "gajanana-enterprises.firebaseapp.com",
            databaseURL: "https://gajanana-enterprises-default-rtdb.firebaseio.com",
            projectId: "gajanana-enterprises",
            storageBucket: "gajanana-enterprises.firebasestorage.app",
            messagingSenderId: "876172631928",
            appId: "1:876172631928:web:94fe19f5fb9b649d6bb28d",
            measurementId: "G-YG7K111JX"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const productsRef = ref(db, 'gajanana_products');

        // ── PARTICLE BACKGROUND ──
        const canvas = document.createElement('canvas');
        canvas.id = 'particles-canvas';
        document.body.prepend(canvas);
        const ctx = canvas.getContext('2d');
        let pts = [];
        const resize = () => { canvas.width = innerWidth; canvas.height = document.documentElement.scrollHeight; };
        resize(); window.addEventListener('resize', resize);
        function makeSpot(startY) {
            return {
                x: Math.random() * innerWidth,
                y: startY !== undefined ? startY : Math.random() * document.documentElement.scrollHeight,
                r: Math.random() * 4 + 1.5,
                dx: (Math.random() - 0.5) * 0.8,
                dy: -(Math.random() * 0.5 + 0.2),
                a: Math.random() * 0.6 + 0.4,
                glow: Math.random() * 10 + 5,
                c: ['142,185,93', '66,133,244', '234,67,53', '251,188,5', '37,211,102'][Math.floor(Math.random() * 5)]
            };
        }
        for (let i = 0; i < 300; i++) pts.push(makeSpot());
        (function loop() {
            resize(); ctx.clearRect(0, 0, canvas.width, canvas.height);
            pts.forEach((p, i) => {
                p.x += p.dx; p.y += p.dy; p.a -= 0.0006;
                if (p.a <= 0 || p.y < -30) { pts[i] = makeSpot(canvas.height + 30); return; }
                const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.glow);
                grad.addColorStop(0, `rgba(${p.c},${p.a * 0.6})`);
                grad.addColorStop(1, `rgba(${p.c},0)`);
                ctx.beginPath(); ctx.arc(p.x, p.y, p.glow, 0, Math.PI * 2); ctx.fillStyle = grad; ctx.fill();
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = `rgba(${p.c},${p.a})`; ctx.fill();
            });
            requestAnimationFrame(loop);
        })();

        // ── PRODUCT LOGIC ──
        let cart = {};
        let products = [];

        const brandMeta = {
            'surya': { name: 'Surya Masale', logo: 'LOGO/surya.png' },
            'artos': { name: 'Artos Beverages', logo: 'LOGO/artos.png' },
            'continental': { name: 'Continental Coffee', logo: 'LOGO/continental.png' },
            'ikava': { name: 'Ikava Hygiene', logo: 'fas fa-pump-soap', isIcon: true },
            'parrys': { name: 'Parry\'s Staples', logo: 'LOGO/parrys.png' },
            'yutika': { name: 'Yutika Skincare', logo: 'LOGO/yutika.png' }
        };

        function renderAll() {
            const container = document.getElementById('catalogContent');
            container.innerHTML = '';
            
            const brandOrder = ['surya', 'artos', 'continental', 'ikava', 'parrys', 'yutika'];
            
            brandOrder.forEach(brandKey => {
                const brandProducts = products.filter(p => p.brand.toLowerCase() === brandKey);
                if (brandProducts.length === 0) return;

                const meta = brandMeta[brandKey] || { name: brandKey, logo: 'fas fa-box', isIcon: true };
                
                const section = document.createElement('section');
                section.className = 'category-section';
                
                const logoHtml = meta.isIcon 
                    ? `<div class="category-logo" style="display:flex; align-items:center; justify-content:center;"><i class="${meta.logo}" style="font-size:1.5rem; color:var(--primary);"></i></div>`
                    : `<img src="${meta.logo}" class="category-logo" alt="${meta.name}">`;

                section.innerHTML = `
                    <div class="category-header">
                        ${logoHtml}
                        <div class="category-info">
                            <h2>${meta.name}</h2>
                            <p>${brandProducts.length} Premium Products</p>
                        </div>
                    </div>
                    <div class="product-grid"></div>
                `;

                const grid = section.querySelector('.product-grid');
                brandProducts.sort((a, b) => a.name.localeCompare(b.name)).forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-item-card';
                    const visual = p.image ? `<img src="${p.image}" class="product-img" style="width:50px; height:50px; border-radius:50%; margin-bottom:1rem; object-fit:cover;">` : `<div class="item-icon-wrapper"><i class="${p.icon || 'fas fa-box'}"></i></div>`;
                    
                    const priceHtml = p.price ? `<div class="product-price">₹${p.price}</div>` : '';
                    const qtyHtml = p.qty ? `<span class="product-qty"><i class="fas fa-weight-hanging"></i> ${p.qty}</span>` : '';
                    
                    card.innerHTML = `
                        ${visual}
                        <h4>${p.name}</h4>
                        <p>${p.desc}</p>
                        <div style="display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:10px; margin-bottom:0.8rem;">
                            ${priceHtml}
                            ${qtyHtml}
                        </div>
                        <div class="product-divider"></div>
                        <div class="product-footer" style="${p.inStock ? '' : 'opacity:0.3; pointer-events:none;'}">
                            <div class="stepper">
                                <button class="step-btn" onclick="updateQty('${p.name}', -1)">-</button>
                                <span class="qty-val" id="qty-${p.name.replace(/\s+/g, '')}">${cart[p.name] || 0}</span>
                                <button class="step-btn" onclick="updateQty('${p.name}', 1)">+</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                container.appendChild(section);
            });
        }

        window.updateQty = function(name, delta) {
            if (!cart[name]) cart[name] = 0;
            cart[name] = Math.max(0, cart[name] + delta);
            const el = document.getElementById(`qty-${name.replace(/\s+/g, '')}`);
            if (el) el.innerText = cart[name];
            updateOrderBar();
        }

        function updateOrderBar() {
            const bar = document.getElementById('orderBar');
            const count = Object.values(cart).reduce((a, b) => a + b, 0);
            const total = products.reduce((acc, p) => acc + (cart[p.name] || 0) * (parseFloat(p.price) || 0), 0);
            
            // Always show the bar, just update contents
            bar.style.display = 'flex';
            bar.style.visibility = 'visible';
            bar.style.opacity = '1';
            
            document.getElementById('itemCount').innerText = `${count} Items Selected`;
            document.getElementById('totalPriceDisplay').innerText = `Total: ₹${total}`;
            
            // Disable button if no items
            const btn = bar.querySelector('.order-btn');
            if (count > 0) {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            } else {
                btn.style.opacity = '0.5';
                btn.style.pointerEvents = 'none';
            }
        }

        window.sendOrder = function() {
            let itemsText = "";
            let total = 0;
            Object.keys(cart).forEach(name => {
                if (cart[name] > 0) {
                    const p = products.find(prod => prod.name === name);
                    const subtotal = (p.price || 0) * cart[name];
                    itemsText += `• ${cart[name]} * ${name}${p.price ? ` (₹${subtotal})` : ''}\n`;
                    total += subtotal;
                }
            });

            const finalizeOrder = (locationLink = "") => {
                let text = "Hi, Sree Gajanana Enterprises I want:\n\n";
                text += itemsText;
                if (total > 0) text += `\n*Estimated Total: ₹${total}*`;
                if (locationLink) text += `\n\n📍 *Customer Location:* ${locationLink}`;
                window.open(`https://wa.me/918125812508?text=${encodeURIComponent(text)}`);
            };

            // Request Location
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        const mapsLink = `https://www.google.com/maps?q=${latitude},${longitude}`;
                        finalizeOrder(mapsLink);
                    },
                    (error) => {
                        console.warn("Location access denied or failed.", error);
                        finalizeOrder(); // Send without location if denied
                    },
                    { timeout: 5000 }
                );
            } else {
                finalizeOrder(); // Geolocation not supported
            }
        }

        // Listen for Cloud Data
        onValue(productsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                products = data;
                renderAll();
                updateOrderBar();
            } else {
                // If cloud is empty, use default products
                products = [
                    { brand: 'surya', name: 'Biryani Masala', price: '150', qty: '100g', desc: 'Authentic aromatic blend.', inStock: true, icon: 'fas fa-pepper-hot' },
                    { brand: 'surya', name: 'Turmeric Powder', price: '80', qty: '200g', desc: 'Pure organic turmeric.', inStock: true, icon: 'fas fa-leaf' },
                    { brand: 'artos', name: 'Orange Artos', price: '40', qty: '250ml', desc: 'The heritage drink of AP.', inStock: true, icon: 'fas fa-glass-whiskey' },
                    { brand: 'artos', name: 'Grape Artos', price: '45', qty: '250ml', desc: 'Refreshing grape flavour.', inStock: true, icon: 'fas fa-glass-whiskey' },
                    { brand: 'continental', name: 'Premium Coffee', price: '290', qty: '50g', desc: 'Rich roasted coffee blend.', inStock: true, icon: 'fas fa-coffee' }
                ];
                renderAll();
                updateOrderBar();
            }
        });
        // Floating Blocks Logic
        const blocksCanvas = document.getElementById('blocks-canvas');
        const bctx = blocksCanvas.getContext('2d');
        let blocks = [];
        const resizeBlocks = () => { 
            blocksCanvas.width = innerWidth; 
            blocksCanvas.height = window.innerHeight; 
        };
        resizeBlocks(); window.addEventListener('resize', resizeBlocks);

        function createBlock() {
            return {
                x: Math.random() * blocksCanvas.width,
                y: Math.random() * blocksCanvas.height,
                size: Math.random() * 80 + 40,
                speed: Math.random() * 0.4 + 0.1,
                rot: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.01,
                opacity: Math.random() * 0.15 + 0.05,
                color: Math.random() > 0.5 ? '142,185,93' : '100,150,255'
            };
        }
        for (let i = 0; i < 20; i++) blocks.push(createBlock());

        function drawBlocks() {
            bctx.clearRect(0, 0, blocksCanvas.width, blocksCanvas.height);
            blocks.forEach(b => {
                b.y -= b.speed;
                b.rot += b.rotSpeed;
                if (b.y + b.size < 0) b.y = blocksCanvas.height + b.size;

                bctx.save();
                bctx.translate(b.x, b.y);
                bctx.rotate(b.rot);
                bctx.strokeStyle = `rgba(${b.color}, ${b.opacity})`;
                bctx.lineWidth = 2;
                bctx.strokeRect(-b.size / 2, -b.size / 2, b.size, b.size);
                
                // Subtle fill
                bctx.fillStyle = `rgba(${b.color}, ${b.opacity * 0.2})`;
                bctx.fillRect(-b.size / 2, -b.size / 2, b.size, b.size);
                bctx.restore();
            });
            requestAnimationFrame(drawBlocks);
        }
        drawBlocks();
    </script>
</body>
</html>
